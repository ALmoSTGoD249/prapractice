<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ITIL 4 and Rigor in Operation – Mock Test</title>

<style>
:root{
/* LIGHT MODE */
--bg:#F5F5DC;
--card:#ffffff;
--panel:#f1f1e6;
--border:#d6d6c8;

--text:#301934;
--muted:#6b5f73;

--accent:#9F2B68;
--cta:#CC5500;

/* STATUS */
--green:#2e7d32;
--red:#c62828;
--yellow:#CC5500;
}

/* DARK MODE */
[data-theme="dark"]{
--bg:#301934;
--card:#3a1f47;
--panel:#2a1635;
--border:#4a2b5e;

--text:#F5F5DC;
--muted:#cbbfd1;

--accent:#9F2B68;
--cta:#CC5500;
}
*{box-sizing:border-box}
body{
margin:0;font-family:Inter,Segoe UI,Arial,sans-serif;
background:var(--bg);color:var(--text);
}
header{
  position:sticky;
  top:0;
  z-index:100;

  display:flex;
  justify-content:space-between;
  align-items:center;

  padding:6px 16px;        /* 🔑 small padding */
  height:64px;             /* 🔑 fixed compact height */

  background:linear-gradient(
    180deg,
    rgba(0,0,0,0.35),
    rgba(0,0,0,0.15)
  );

  border-bottom:1px solid var(--border);
  backdrop-filter:blur(8px);
}
.timer{color:var(--green);font-weight:600;font-size:18px}
main{display:flex;max-width:1300px;margin:0 auto}
aside{
width:260px;border-right:1px solid var(--border);
padding:20px;position:sticky;top:64px;height:calc(100vh - 64px);overflow:auto;
}
aside h3{margin-top:0;font-size:16px;color:var(--muted)}
.grid{
display:grid;grid-template-columns:repeat(5,1fr);gap:8px;
}
.nav-btn{
padding:8px;border-radius:6px;border:1px solid var(--border);
background:var(--panel);color:var(--muted);cursor:pointer;
font-size:13px;text-align:center;
}
.nav-btn.answered{border-color:var(--yellow);color:var(--yellow)}
.nav-btn.correct{border-color:var(--green);color:var(--green)}
.nav-btn.wrong{border-color:var(--red);color:var(--red)}
section{
flex:1;padding:30px 40px;
}
.progress{
height:6px;background:#111;border-radius:6px;overflow:hidden;margin-bottom:20px;
}
.progress div{
height:100%;width:0;background:linear-gradient(90deg,#2ec866,#1ba94c);
transition:.3s;
}
.question{
background:var(--card);border:1px solid var(--border);
border-radius:10px;padding:22px;margin-bottom:24px;
}
.question b{display:block;margin-bottom:14px}
.options label{
display:block;padding:10px 12px;margin-bottom:8px;
border-radius:8px;background:var(--panel);
border:1px solid var(--border);cursor:pointer;transition:.2s;
}
.options label:hover{border-color:var(--green)}
input{margin-right:10px;accent-color:var(--green)}
.solution{
display:none;margin-top:14px;padding:14px;
background:var(--panel);border-left:4px solid var(--border);
border-radius:8px;color:var(--muted);font-size:14px;
}
.correct{border-left-color:var(--green)}
.wrong{border-left-color:var(--red)}
button{
display:block;margin:50px auto;padding:14px 48px;
font-size:16px;font-weight:600;
background:linear-gradient(135deg,#2ec866,#1ba94c);
color:#06130c;border:none;border-radius:8px;cursor:pointer;
}
.result{
display:none;background:var(--card);border-left:6px solid var(--green);
padding:26px;border-radius:10px;margin-bottom:40px;
}
button:hover{
  transform:translateY(-1px);
  box-shadow:0 6px 18px rgba(0,0,0,.2);
}

.nav-btn{
  transition:.2s ease;
}

.nav-btn:hover{
  background:var(--accent);
  color:#fff;
  border-color:var(--accent);
}

.options label{
  transition:.2s ease;
}

.options input:checked + span{
  color:var(--accent);
}

.question{
  box-shadow:0 10px 30px rgba(0,0,0,.15);
}
header b{
  font-size:24px;
  font-weight:600;
}

.timer{
  font-size:14px;
  font-weight:600;
}
</style>
</head>

<body>

<header>
<b>ITIL 4 and Rigor in Operation – Mock Test</b>
<div style="display:flex;gap:16px;align-items:center">
  <button id="themeToggle" title="Toggle theme"
    style="
      background:var(--panel);
      border:1px solid var(--border);
      color:var(--text);
      padding:6px 10px;
      border-radius:8px;
      cursor:pointer;
      font-weight:600;">
    🌙
  </button>
  <div class="timer" id="timer">60:00</div>
</div>
</header>



<main>
<aside>
<h3>Questions</h3>
<div class="grid" id="nav"></div>
</aside>

<section>
<div class="progress"><div id="progressBar"></div></div>
<div id="result" class="result"></div>
<form id="quizForm"></form>
</section>
</main>

<script>
/* TIMER */
let time=3600,submitted=false;
const timerEl=document.getElementById("timer");
const timer=setInterval(()=>{
time--;
timerEl.textContent=
String(Math.floor(time/60)).padStart(2,'0')+":"+
String(time%60).padStart(2,'0');
if(time<=0&&!submitted){clearInterval(timer);submitQuiz(true);}
},1000);
const toggleBtn = document.getElementById("themeToggle");
const root = document.documentElement;

function setTheme(theme){
  root.setAttribute("data-theme", theme);
  localStorage.setItem("theme", theme);
  toggleBtn.innerHTML = theme === "dark"
  ? `<svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" fill="none" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M1 12h2M21 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/></svg>`
  : `<svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M21 12.8A9 9 0 1111.2 3a7 7 0 009.8 9.8z"/></svg>`;
}

/* Load saved theme */
const savedTheme = localStorage.getItem("theme") || "dark";
setTheme(savedTheme);

toggleBtn.onclick = () => {
  const current = root.getAttribute("data-theme");
  setTheme(current === "dark" ? "light" : "dark");
};
const questions = [

/* ================= ITIL 4 (1–25) ================= */

["What is the purpose of ITIL 4?",
["Manage hardware only","Improve IT service management","Develop software only","Replace DevOps"],
1,"ITIL focuses on service management best practices"],

["What does SVS stand for in ITIL 4?",
["Service Value System","System Value Service","Service Validation System","Software Value Structure"],
0,"SVS = Service Value System"],

["Which is a component of the ITIL Service Value System?",
["Governance","Firewall","Database","Hardware"],
0,"Governance is part of SVS"],

["How many guiding principles are in ITIL 4?",
["5","6","7","8"],
2,"There are 7 guiding principles"],

["Which is an ITIL 4 guiding principle?",
["Focus on profit only","Start where you are","Avoid collaboration","Ignore feedback"],
1,"Start where you are is a principle"],

["What is a service in ITIL?",
["A software tool","A means of enabling value co-creation","A server","A contract"],
1,"Service enables value co-creation"],

["What does 'value co-creation' mean?",
["IT creates value alone","Customers create value alone","Value created jointly","No value needed"],
2,"Provider and consumer both contribute"],

["Which practice replaces Incident Management in ITIL 4?",
["Event Management","Incident Management","Problem Control","Service Recovery"],
1,"Incident Management still exists as practice"],

["What is the goal of Incident Management?",
["Eliminate root cause","Restore service quickly","Prevent incidents","Change hardware"],
1,"Focus is quick restoration"],

["What is the goal of Problem Management?",
["Fix server","Find root cause","Upgrade system","Increase budget"],
1,"Problem management identifies root cause"],

["Change Enablement is formerly known as?",
["Change Management","Release Control","Upgrade Process","IT Audit"],
0,"Renamed in ITIL 4"],

["What is a standard change?",
["High risk change","Emergency change","Pre-approved low-risk change","Unauthorized change"],
2,"Standard change is low-risk pre-approved"],

["Service Desk primarily handles?",
["Coding","Customer communication","Procurement","Auditing"],
1,"Service desk interacts with users"],

["Which practice manages risks?",
["Information Security Management","Network Management","Coding Practice","Database Admin"],
0,"Security manages risks to information"],

["What is continual improvement?",
["One-time change","Ongoing improvement activity","Audit process","Budget planning"],
1,"Continual improvement is ongoing"],

["What does KPI stand for?",
["Key Process Indicator","Key Performance Indicator","Knowledge Process Index","Known Performance Issue"],
1,"KPI measures performance"],

["SLA stands for?",
["Service Level Agreement","System License Agreement","Service Logging Act","Standard Level Access"],
0,"SLA defines service targets"],

["Which practice ensures accurate service info?",
["Service Configuration Management","Incident Control","Problem Review","Change Freeze"],
0,"SCM manages configuration info"],

["A known error is identified in?",
["Incident record","Problem record","Change record","SLA document"],
1,"Known errors are part of problem management"],

["Event Management monitors?",
["Customer mood","Infrastructure events","Finance records","Audit logs only"],
1,"Event management monitors events"],

["Which practice manages user access?",
["Access Management","Incident Response","Change Control","DevOps"],
0,"Access Management controls rights"],

["What is technical debt?",
["Unpaid invoice","Outdated system shortcuts","Network fee","Legal cost"],
1,"Technical debt from shortcuts"],

["Service request is handled by?",
["Request Management","Problem Management","Risk Control","Audit"],
0,"Service requests handled by request mgmt"],

["Release Management ensures?",
["Code storage","Deploying new features safely","Audit report","License renewal"],
1,"Release mgmt ensures safe deployment"],

["Governance ensures?",
["Daily ticketing","Strategic direction and compliance","Coding","Server maintenance"],
1,"Governance sets direction"],

/* ================= RIGOR IN OPERATIONS (26–50) ================= */

["Operational rigor primarily focuses on?",
["Speed only","Process discipline and consistency","Creativity","Reducing staff"],
1,"Rigor ensures consistent execution"],

["Runbooks are used to?",
["Write policies","Document operational procedures","Track budgets","Develop UI"],
1,"Runbooks guide operations"],

["What is RCA?",
["Root Cause Analysis","Remote Control Access","Rapid Code Action","Risk Control Audit"],
0,"RCA finds root causes"],

["A post-incident review should be?",
["Blame-focused","Blameless and analytical","Confidential only","Skipped"],
1,"Blameless culture improves learning"],

["Mean Time To Repair (MTTR) measures?",
["Average downtime recovery time","Budget","Ticket count","Security breaches"],
0,"MTTR = recovery time"],

["Change failure rate measures?",
["Code quality","Failed deployments","Customer complaints","Budget risk"],
1,"Change failure rate tracks failed changes"],

["Operational excellence requires?",
["Ad-hoc fixes","Defined processes","Random actions","No documentation"],
1,"Defined process discipline"],

["Escalation policy ensures?",
["Faster procurement","Proper issue routing","Extra budget","HR action"],
1,"Escalation routes issues properly"],

["A playbook differs from runbook because it?",
["Is technical only","Covers broader scenario strategy","Is outdated","Is financial"],
1,"Playbooks guide complex scenarios"],

["Service reliability improves by?",
["Ignoring alerts","Monitoring proactively","Manual tracking","Reducing logs"],
1,"Proactive monitoring improves reliability"],

["Capacity planning prevents?",
["Hardware theft","Performance bottlenecks","User training","Policy violation"],
1,"Prevents performance issues"],

["Which improves operational transparency?",
["Dashboards","Silence","Hidden metrics","Manual reports only"],
0,"Dashboards improve visibility"],

["Operational KPIs should be?",
["Unclear","Measurable","Optional","Hidden"],
1,"KPIs must be measurable"],

["What is toil in operations?",
["Strategic planning","Repetitive manual work","Security incident","Budget review"],
1,"Toil = repetitive work"],

["Automation reduces?",
["Risk visibility","Manual errors","Learning","Monitoring"],
1,"Automation reduces human error"],

["Incident severity levels help?",
["Increase paperwork","Prioritize response","Delay actions","Reduce monitoring"],
1,"Severity prioritizes response"],

["Compliance audits verify?",
["Marketing plans","Adherence to standards","Coding style","Server uptime"],
1,"Audits verify compliance"],

["SRE primarily focuses on?",
["Design only","Reliability engineering","Marketing","Procurement"],
1,"Site Reliability Engineering"],

["Error budgets balance?",
["Security & cost","Innovation & reliability","HR & finance","Design & coding"],
1,"Error budget balances speed and stability"],

["Operational maturity improves through?",
["Ignoring incidents","Continuous review","Blame culture","Less monitoring"],
1,"Continuous review improves maturity"],

["A single point of failure should be?",
["Ignored","Documented and mitigated","Increased","Hidden"],
1,"Mitigate SPOF"],

["Alert fatigue occurs when?",
["Too few alerts","Too many low-quality alerts","No monitoring","High uptime"],
1,"Excessive alerts reduce effectiveness"],

["Rollback strategy is important during?",
["Deployment","Audit","Ticket closure","Capacity review"],
0,"Rollback ensures safe deployment"],

["Configuration drift refers to?",
["Hardware theft","Unplanned system changes","Budget gap","Server crash"],
1,"Drift = config mismatch"],

["Operational documentation should be?",
["Optional","Version controlled","Private only","Temporary"],
1,"Version control ensures accuracy"]

];
/* SHUFFLE */
questions.sort(()=>Math.random()-0.5);

/* RENDER */
const form=document.getElementById("quizForm");
const nav=document.getElementById("nav");

questions.forEach((q,i)=>{
  nav.innerHTML+=`
    <div class="nav-btn" id="nav${i}" onclick="go(${i})">${i+1}</div>
  `;

  form.innerHTML+=`
    <div class="question" id="q${i}">
      <b>${i+1}. ${q[0]}</b>
      <div class="options">
        ${q[1].map((o,j)=>`
          <label>
            <input type="radio" name="q${i}" value="${j}" onchange="mark(${i})">
            ${o}
          </label>
        `).join("")}
      </div>
      <div class="solution" id="sol${i}">
        <b>Answer:</b> ${q[1][q[2]]}<br>
        <b>Explanation:</b> ${q[3]}
      </div>
    </div>
  `;
});

form.innerHTML+=`<button type="button" onclick="submitQuiz()">Submit</button>`;

/* INTERACTION */
function go(i){
  document.getElementById("q"+i).scrollIntoView({behavior:"smooth"});
}

function mark(i){
  document.getElementById("nav"+i).classList.add("answered");
  updateProgress();
}

function updateProgress(){
  const done=document.querySelectorAll(".answered").length;
  document.getElementById("progressBar").style.width=
    (done/questions.length*100)+"%";
}


/* SUBMIT */
function submitQuiz(auto=false){
  submitted=true;
  clearInterval(timer);

  let score=0;

  questions.forEach((q,i)=>{
    const sel=document.querySelector(`input[name="q${i}"]:checked`);
    const navBtn=document.getElementById("nav"+i);
    const sol=document.getElementById("sol"+i);

    sol.style.display="block";

    const correctIndex = Array.isArray(q[2]) ? q[2][0] : q[2];

    if(sel && Number(sel.value) === correctIndex){
      score++;
      sol.classList.add("correct");
      navBtn.className="nav-btn correct";
    }else{
      sol.classList.add("wrong");
      navBtn.className="nav-btn wrong";
    }
  });

  const total = questions.length;
  const percentage = ((score/total)*100).toFixed(0);

  const res=document.getElementById("result");
  res.style.display="block";
  res.innerHTML=`
    <h2>Result</h2>
    <p><b>Score:</b> ${score}/${total}</p>
    <p><b>Percentage:</b> ${percentage}%</p>
    ${auto?"<b>Auto-submitted (Time Over)</b>":""}
  `;

  window.scrollTo({top:0,behavior:"smooth"});
}
</script>

</body>
</html>
