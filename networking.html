<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Computer Networking – Mock Test</title>

<style>
:root{
/* LIGHT MODE */
--bg:#F5F5DC;
--card:#ffffff;
--panel:#f1f1e6;
--border:#d6d6c8;

--text:#301934;
--muted:#6b5f73;

--accent:#9F2B68;
--cta:#CC5500;

/* STATUS */
--green:#2e7d32;
--red:#c62828;
--yellow:#CC5500;
}

/* DARK MODE */
[data-theme="dark"]{
--bg:#301934;
--card:#3a1f47;
--panel:#2a1635;
--border:#4a2b5e;

--text:#F5F5DC;
--muted:#cbbfd1;

--accent:#9F2B68;
--cta:#CC5500;
}
*{box-sizing:border-box}
body{
margin:0;font-family:Inter,Segoe UI,Arial,sans-serif;
background:var(--bg);color:var(--text);
}
header{
  position:sticky;
  top:0;
  z-index:100;

  display:flex;
  justify-content:space-between;
  align-items:center;

  padding:6px 16px;        /* 🔑 small padding */
  height:64px;             /* 🔑 fixed compact height */

  background:linear-gradient(
    180deg,
    rgba(0,0,0,0.35),
    rgba(0,0,0,0.15)
  );

  border-bottom:1px solid var(--border);
  backdrop-filter:blur(8px);
}
.timer{color:var(--green);font-weight:600;font-size:18px}
main{display:flex;max-width:1300px;margin:0 auto}
aside{
width:260px;border-right:1px solid var(--border);
padding:20px;position:sticky;top:64px;height:calc(100vh - 64px);overflow:auto;
}
aside h3{margin-top:0;font-size:16px;color:var(--muted)}
.grid{
display:grid;grid-template-columns:repeat(5,1fr);gap:8px;
}
.nav-btn{
padding:8px;border-radius:6px;border:1px solid var(--border);
background:var(--panel);color:var(--muted);cursor:pointer;
font-size:13px;text-align:center;
}
.nav-btn.answered{border-color:var(--yellow);color:var(--yellow)}
.nav-btn.correct{border-color:var(--green);color:var(--green)}
.nav-btn.wrong{border-color:var(--red);color:var(--red)}
section{
flex:1;padding:30px 40px;
}
.progress{
height:6px;background:#111;border-radius:6px;overflow:hidden;margin-bottom:20px;
}
.progress div{
height:100%;width:0;background:linear-gradient(90deg,#2ec866,#1ba94c);
transition:.3s;
}
.question{
background:var(--card);border:1px solid var(--border);
border-radius:10px;padding:22px;margin-bottom:24px;
}
.question b{display:block;margin-bottom:14px}
.options label{
display:block;padding:10px 12px;margin-bottom:8px;
border-radius:8px;background:var(--panel);
border:1px solid var(--border);cursor:pointer;transition:.2s;
}
.options label:hover{border-color:var(--green)}
input{margin-right:10px;accent-color:var(--green)}
.solution{
display:none;margin-top:14px;padding:14px;
background:var(--panel);border-left:4px solid var(--border);
border-radius:8px;color:var(--muted);font-size:14px;
}
.correct{border-left-color:var(--green)}
.wrong{border-left-color:var(--red)}
button{
display:block;margin:50px auto;padding:14px 48px;
font-size:16px;font-weight:600;
background:linear-gradient(135deg,#2ec866,#1ba94c);
color:#06130c;border:none;border-radius:8px;cursor:pointer;
}
.result{
display:none;background:var(--card);border-left:6px solid var(--green);
padding:26px;border-radius:10px;margin-bottom:40px;
}
button:hover{
  transform:translateY(-1px);
  box-shadow:0 6px 18px rgba(0,0,0,.2);
}

.nav-btn{
  transition:.2s ease;
}

.nav-btn:hover{
  background:var(--accent);
  color:#fff;
  border-color:var(--accent);
}

.options label{
  transition:.2s ease;
}

.options input:checked + span{
  color:var(--accent);
}

.question{
  box-shadow:0 10px 30px rgba(0,0,0,.15);
}
header b{
  font-size:24px;
  font-weight:600;
}

.timer{
  font-size:14px;
  font-weight:600;
}
</style>
</head>

<body>

<header>
<b>Computer Networking – Mock Test</b>
<div style="display:flex;gap:16px;align-items:center">
  <button id="themeToggle" title="Toggle theme"
    style="
      background:var(--panel);
      border:1px solid var(--border);
      color:var(--text);
      padding:6px 10px;
      border-radius:8px;
      cursor:pointer;
      font-weight:600;">
    🌙
  </button>
  <div class="timer" id="timer">60:00</div>
</div>
</header>



<main>
<aside>
<h3>Questions</h3>
<div class="grid" id="nav"></div>
</aside>

<section>
<div class="progress"><div id="progressBar"></div></div>
<div id="result" class="result"></div>
<form id="quizForm"></form>
</section>
</main>

<script>
/* TIMER */
let time=3600,submitted=false;
const timerEl=document.getElementById("timer");
const timer=setInterval(()=>{
time--;
timerEl.textContent=
String(Math.floor(time/60)).padStart(2,'0')+":"+
String(time%60).padStart(2,'0');
if(time<=0&&!submitted){clearInterval(timer);submitQuiz(true);}
},1000);
const toggleBtn = document.getElementById("themeToggle");
const root = document.documentElement;

function setTheme(theme){
  root.setAttribute("data-theme", theme);
  localStorage.setItem("theme", theme);
  toggleBtn.innerHTML = theme === "dark"
  ? `<svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" fill="none" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M1 12h2M21 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/></svg>`
  : `<svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M21 12.8A9 9 0 1111.2 3a7 7 0 009.8 9.8z"/></svg>`;
}

/* Load saved theme */
const savedTheme = localStorage.getItem("theme") || "dark";
setTheme(savedTheme);

toggleBtn.onclick = () => {
  const current = root.getAttribute("data-theme");
  setTheme(current === "dark" ? "light" : "dark");
};
const questions = [
["Which device operates at Layer 2 of the OSI model?",
["Hub","Switch","Router","Modem"],
[1],"Switch operates at Data Link layer"],

["Which topology fails if the central device goes down?",
["Bus","Ring","Star","Mesh"],
[2],"Star topology depends on central device"],

["Ethernet uses which media access method?",
["Token Passing","CSMA/CD","CSMA/CA","TDMA"],
[1],"Ethernet uses CSMA/CD"],

["How many layers are there in the OSI model?",
["4","5","6","7"],
[3],"OSI has 7 layers"],

["Which OSI layer handles encryption?",
["Session","Presentation","Transport","Application"],
[1],"Presentation layer handles encryption"],

["Which protocol assigns IP addresses automatically?",
["DNS","FTP","DHCP","HTTP"],
[2],"DHCP assigns IPs"],

["Which network type covers a small office?",
["WAN","MAN","LAN","PAN"],
[2],"LAN is local area network"],

["IPv4 address length is?",
["16 bits","32 bits","64 bits","128 bits"],
[1],"IPv4 is 32-bit"],

["Which is a private IP address?",
["8.8.8.8","172.16.1.10","1.1.1.1","200.1.1.1"],
[1],"172.16.0.0 – 172.31.255.255"],

["Subnet mask for /24 is?",
["255.0.0.0","255.255.255.0","255.255.255.128","255.255.255.252"],
[1],"/24 equals 255.255.255.0"],

["How many usable hosts in /26?",
["62","64","30","126"],
[0],"64 total minus 2 = 62"],

["Switch forwards frames based on?",
["IP address","MAC address","Port number","Protocol"],
[1],"Switch uses MAC table"],

["Purpose of STP?",
["Increase speed","Prevent routing loops","Prevent switching loops","Assign IP"],
[2],"STP prevents loops"],

["Root bridge is selected based on?",
["Highest MAC","Lowest MAC","Highest priority","Lowest priority"],
[3],"Lowest priority wins"],

["Which protocol is used for network monitoring?",
["FTP","SNMP","SMTP","Telnet"],
[1],"SNMP monitors devices"],

["Ping uses which protocol?",
["TCP","UDP","ICMP","ARP"],
[2],"Ping uses ICMP"],

["Routing decisions are based on?",
["MAC table","VLAN ID","Routing table","Port"],
[2],"Router uses routing table"],

["Which routing logic prefers most specific route?",
["Default routing","Static routing","Longest prefix match","Load balancing"],
[2],"LPM rule"],

["Static routing is best for?",
["Large dynamic networks","Frequently changing networks","Small stable networks","Internet"],
[2],"Static = small networks"],

["Command to configure static route?",
["route add","ip route","router static","set route"],
[1],"Cisco uses ip route"],

["Dynamic routing protocols do what?",
["Assign MAC","Detect topology changes","Encrypt traffic","Create VLANs"],
[1],"They adapt automatically"],

["Which is NOT a routing metric?",
["Bandwidth","Delay","Hop count","MAC address"],
[3],"MAC not a metric"],

["RIP uses which metric?",
["Bandwidth","Delay","Hop count","Cost"],
[2],"Hop count"],

["Maximum hop count in RIP?",
["10","15","16","255"],
[1],"15 max hops"],

["OSPF is a?",
["Distance vector","Hybrid","Link-state","Path vector"],
[2],"OSPF is link-state"],

["OSPF uses which algorithm?",
["Bellman-Ford","Dijkstra","Flooding","Round Robin"],
[1],"SPF algorithm"],

["OSPF backbone area?",
["Area 1","Area 10","Area 0","Area 255"],
[2],"Area 0 is backbone"],

["EIGRP is developed by?",
["IEEE","ISO","Cisco","IETF"],
[2],"Cisco proprietary"],

["EIGRP uses which algorithm?",
["SPF","Bellman-Ford","DUAL","Flooding"],
[2],"DUAL algorithm"],

["ACL is used for?",
["Routing","Filtering traffic","Encryption","Monitoring"],
[1],"ACL filters traffic"],

["Standard ACL filters based on?",
["Destination IP","Source IP","Port","Protocol"],
[1],"Standard = source IP"],

["NAT is used to?",
["Improve speed","Convert private to public IP","Assign MAC","Encrypt data"],
[1],"NAT hides private IPs"],

["PAT allows?",
["One-to-one mapping","Many-to-many","Many-to-one","Static mapping"],
[2],"PAT = many to one"],

["Syslog is used for?",
["Routing updates","Log management","Address resolution","Authentication"],
[1],"Syslog collects logs"],

["Lower Syslog severity means?",
["Less critical","More critical","Debug only","Info only"],
[1],"0 is emergency"],

["Best protocol for large enterprise?",
["RIP","OSPF","Static","BGP"],
[1],"OSPF scales well"],

["Broadcast storm prevention?",
["VLAN","STP","ARP","NAT"],
[1],"STP blocks loops"],

["Longest prefix match chooses?",
["/0","Least specific","Most specific","Random"],
[2],"Most specific subnet"],

["PC cannot reach outside network. Missing?",
["IP","Subnet mask","Gateway","DNS"],
[2],"Default gateway needed"],

["Device that breaks collision domains?",
["Hub","Switch","Router","Repeater"],
[1],"Switch breaks collision domains"],

["Classless routing protocol?",
["RIPv1","RIPv2","IGRP","RIP"],
[1],"RIPv2 is classless"],

["Router operates at which OSI layer?",
["Data Link","Network","Transport","Application"],
[1],"Layer 3"],

["Switch forwards using?",
["IP","MAC","Port","Subnet"],
[1],"MAC address"],

["Command to check interface status?",
["show ip route","show run","show interfaces","show vlan"],
[2],"show interfaces"],

["WAN covers?",
["Room","Building","City","Country"],
[3],"WAN spans countries"]
];

/* SHUFFLE QUESTIONS (Fisher–Yates) */
function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

/* Shuffle questions on load */
shuffle(questions);


/* RENDER */
const form=document.getElementById("quizForm");
const nav=document.getElementById("nav");
questions.forEach((q,i)=>{
nav.innerHTML+=`<div class="nav-btn" id="nav${i}" onclick="go(${i})">${i+1}</div>`;
form.innerHTML+=`
<div class="question" id="q${i}">
<b>${i+1}. ${q[0]}</b>
<div class="options">
${q[1].map((o,j)=>`
<label>
<input type="radio" name="q${i}" value="${j}" onchange="mark(${i})">${o}
</label>`).join("")}
</div>
<div class="solution" id="sol${i}">
<b>Answer:</b> ${q[1][q[2][0]]}<br>
<b>Explanation:</b> ${q[3]}
</div>
</div>`;
});
form.innerHTML+=`<button type="button" onclick="submitQuiz()">Submit</button>`;

/* INTERACTION */
function go(i){document.getElementById("q"+i).scrollIntoView({behavior:"smooth"})}
function mark(i){
document.getElementById("nav"+i).classList.add("answered");
updateProgress();
}
function updateProgress(){
const done=document.querySelectorAll(".answered").length;
document.getElementById("progressBar").style.width=(done/questions.length*100)+"%";
}

/* SUBMIT */
function submitQuiz(auto=false){
  submitted=true;
  clearInterval(timer);

  let score=0;

  questions.forEach((q,i)=>{
    const sel=document.querySelector(`input[name="q${i}"]:checked`);
    const navBtn=document.getElementById("nav"+i);
    const sol=document.getElementById("sol"+i);

    sol.style.display="block";

    const correctIndex = Array.isArray(q[2]) ? q[2][0] : q[2];

    if(sel && Number(sel.value) === correctIndex){
      score++;
      sol.classList.add("correct");
      navBtn.className="nav-btn correct";
    }else{
      sol.classList.add("wrong");
      navBtn.className="nav-btn wrong";
    }
  });

  const total = questions.length;
  const percentage = ((score/total)*100).toFixed(0);

  const res=document.getElementById("result");
  res.style.display="block";
  res.innerHTML=`
    <h2>Result</h2>
    <p><b>Score:</b> ${score}/${total}</p>
    <p><b>Percentage:</b> ${percentage}%</p>
    ${auto?"<b>Auto-submitted (Time Over)</b>":""}
  `;

  window.scrollTo({top:0,behavior:"smooth"});
}
</script>

</body>
</html>
