<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Windows – Interactive Mock Test</title>

<style>
:root{
/* LIGHT MODE */
--bg:#F5F5DC;
--card:#ffffff;
--panel:#f1f1e6;
--border:#d6d6c8;

--text:#301934;
--muted:#6b5f73;

--accent:#9F2B68;
--cta:#CC5500;

/* STATUS */
--green:#2e7d32;
--red:#c62828;
--yellow:#CC5500;
}

/* DARK MODE */
[data-theme="dark"]{
--bg:#301934;
--card:#3a1f47;
--panel:#2a1635;
--border:#4a2b5e;

--text:#F5F5DC;
--muted:#cbbfd1;

--accent:#9F2B68;
--cta:#CC5500;
}
*{box-sizing:border-box}
body{
margin:0;font-family:Inter,Segoe UI,Arial,sans-serif;
background:var(--bg);color:var(--text);
}
header{
  position:sticky;
  top:0;
  z-index:100;

  display:flex;
  justify-content:space-between;
  align-items:center;

  padding:6px 16px;        /* 🔑 small padding */
  height:64px;             /* 🔑 fixed compact height */

  background:linear-gradient(
    180deg,
    rgba(0,0,0,0.35),
    rgba(0,0,0,0.15)
  );

  border-bottom:1px solid var(--border);
  backdrop-filter:blur(8px);
}
.timer{color:var(--green);font-weight:600;font-size:18px}
main{display:flex;max-width:1300px;margin:0 auto}
aside{
width:260px;border-right:1px solid var(--border);
padding:20px;position:sticky;top:64px;height:calc(100vh - 64px);overflow:auto;
}
aside h3{margin-top:0;font-size:16px;color:var(--muted)}
.grid{
display:grid;grid-template-columns:repeat(5,1fr);gap:8px;
}
.nav-btn{
padding:8px;border-radius:6px;border:1px solid var(--border);
background:var(--panel);color:var(--muted);cursor:pointer;
font-size:13px;text-align:center;
}
.nav-btn.answered{border-color:var(--yellow);color:var(--yellow)}
.nav-btn.correct{border-color:var(--green);color:var(--green)}
.nav-btn.wrong{border-color:var(--red);color:var(--red)}
section{
flex:1;padding:30px 40px;
}
.progress{
height:6px;background:#111;border-radius:6px;overflow:hidden;margin-bottom:20px;
}
.progress div{
height:100%;width:0;background:linear-gradient(90deg,#2ec866,#1ba94c);
transition:.3s;
}
.question{
background:var(--card);border:1px solid var(--border);
border-radius:10px;padding:22px;margin-bottom:24px;
}
.question b{display:block;margin-bottom:14px}
.options label{
display:block;padding:10px 12px;margin-bottom:8px;
border-radius:8px;background:var(--panel);
border:1px solid var(--border);cursor:pointer;transition:.2s;
}
.options label:hover{border-color:var(--green)}
input{margin-right:10px;accent-color:var(--green)}
.solution{
display:none;margin-top:14px;padding:14px;
background:var(--panel);border-left:4px solid var(--border);
border-radius:8px;color:var(--muted);font-size:14px;
}
.correct{border-left-color:var(--green)}
.wrong{border-left-color:var(--red)}
button{
display:block;margin:50px auto;padding:14px 48px;
font-size:16px;font-weight:600;
background:linear-gradient(135deg,#2ec866,#1ba94c);
color:#06130c;border:none;border-radius:8px;cursor:pointer;
}
.result{
display:none;background:var(--card);border-left:6px solid var(--green);
padding:26px;border-radius:10px;margin-bottom:40px;
}
button:hover{
  transform:translateY(-1px);
  box-shadow:0 6px 18px rgba(0,0,0,.2);
}

.nav-btn{
  transition:.2s ease;
}

.nav-btn:hover{
  background:var(--accent);
  color:#fff;
  border-color:var(--accent);
}

.options label{
  transition:.2s ease;
}

.options input:checked + span{
  color:var(--accent);
}

.question{
  box-shadow:0 10px 30px rgba(0,0,0,.15);
}
header b{
  font-size:24px;
  font-weight:600;
}

.timer{
  font-size:14px;
  font-weight:600;
}
</style>
</head>

<body data-theme="dark">

<header>
  <b>Windows Mock Test</b>
  <div class="timer" id="timer">60:00</div>
</header>

<main>
  <aside>
    <h3>Questions</h3>
    <div class="grid" id="nav"></div>
  </aside>

  <section>
    <div class="progress"><div id="progressBar"></div></div>
    <div id="result" class="result"></div>
    <form id="quizForm"></form>
  </section>
</main>

<script>
/* TIMER */
let time=3600,submitted=false;
const timerEl=document.getElementById("timer");

const timer=setInterval(()=>{
  time--;
  timerEl.textContent=
    String(Math.floor(time/60)).padStart(2,'0')+":"+
    String(time%60).padStart(2,'0');

  if(time<=0 && !submitted){
    clearInterval(timer);
    submitQuiz(true);
  }
},1000);

const questions = [

/* ================= WINDOWS 11 ESSENTIAL TRAINING (1–20) ================= */

["What is the purpose of the Start menu in Windows 11?",
["Manage BIOS settings","Launch apps and access system features","Format drives","Install drivers"],
1,
"The Start menu is the central access point for launching applications, searching files, accessing settings, and managing power options in Windows 11."],

["What does the Taskbar primarily provide?",
["File storage","Application shortcuts and running apps","Firewall settings","Registry access"],
1,
"The Taskbar displays pinned apps, running programs, system tray icons, and provides quick access to system functions."],

["Which tool allows you to organize windows automatically on screen?",
["Disk Management","Snap Layouts","Event Viewer","Services"],
1,
"Snap Layouts allow users to organize open windows into predefined layouts for better multitasking."],

["File Explorer is mainly used to?",
["Monitor CPU usage","Manage files and folders","Change BIOS","Install updates"],
1,
"File Explorer enables browsing, copying, moving, renaming, and managing files and directories."],

["What does OneDrive integration allow?",
["Local-only storage","Cloud file synchronization","Driver installation","Firewall management"],
1,
"OneDrive syncs files between local device and cloud storage for backup and remote access."],

["Virtual Desktops help users to?",
["Increase RAM","Organize separate workspaces","Repair registry","Install software"],
1,
"Virtual desktops allow multiple workspace environments for productivity."],

["The Settings app replaces which legacy tool?",
["Control Panel","Task Manager","Disk Cleanup","Services"],
0,
"Windows 11 continues transitioning system configuration from Control Panel to Settings."],

["Windows Search can be accessed by?",
["Right-click desktop","Pressing Windows key","BIOS","Safe Mode"],
1,
"Pressing the Windows key opens Start and allows searching files, apps, and settings."],

["Widgets in Windows 11 provide?",
["Security alerts only","Personalized info like weather and news","Driver updates","BIOS configuration"],
1,
"Widgets show personalized dynamic content such as weather, calendar, and news."],

["Which feature allows touch gesture navigation?",
["Snap Layout","Touch mode","Safe Boot","BitLocker"],
1,
"Touch mode enhances Windows usability on touchscreen devices."],

/* ================= MANAGE & MAINTAIN (21–40) ================= */

["Windows Update is used to?",
["Upgrade BIOS","Install OS patches and features","Delete registry","Install RAM"],
1,
"Windows Update ensures the OS receives security patches, bug fixes, and feature updates."],

["Device Manager is used to?",
["Format disk","Manage hardware drivers","Install apps","Run diagnostics"],
1,
"Device Manager allows viewing and managing device drivers."],

["Disk Cleanup helps to?",
["Encrypt drive","Remove temporary files","Defragment","Reinstall OS"],
1,
"Disk Cleanup removes unnecessary files to free disk space."],

["What does Storage Sense do?",
["Encrypts files","Automatically frees disk space","Updates drivers","Fixes registry"],
1,
"Storage Sense automatically deletes temporary and unused files."],

["System Restore is used to?",
["Delete OS","Roll back system settings","Upgrade Windows","Clear memory"],
1,
"System Restore reverts Windows settings to a previous restore point."],

["Group Policy Editor is mainly used for?",
["Gaming settings","Enterprise configuration control","BIOS access","Printer setup"],
1,
"Group Policy manages centralized configuration settings in enterprise environments."],

["Event Viewer helps administrators to?",
["Update firmware","View system logs","Install updates","Format drives"],
1,
"Event Viewer displays application, system, and security logs for troubleshooting."],

["Task Scheduler is used to?",
["Install drivers","Automate tasks","Encrypt drive","Monitor RAM"],
1,
"Task Scheduler allows automated execution of tasks at specific times."],

["What does 'Reset this PC' option do?",
["Deletes BIOS","Reinstalls Windows","Formats external drive","Upgrades CPU"],
1,
"It reinstalls Windows while optionally keeping user files."],

["Services.msc manages?",
["Background services","Drivers only","Disk partitions","Firewall rules"],
0,
"Services console controls Windows services startup and status."],

/* ================= TROUBLESHOOTING BASICS (41–60) ================= */

["Safe Mode is used for?",
["Gaming","Troubleshooting startup issues","BIOS flashing","Installing printers"],
1,
"Safe Mode loads minimal drivers to help troubleshoot system problems."],

["Blue Screen errors are commonly called?",
["Green Screen","Stop errors","Crash logs","Kernel UI"],
1,
"BSOD is also known as Stop Error indicating critical system failure."],

["SFC command is used to?",
["Scan system files","Install drivers","Format drive","Delete logs"],
0,
"System File Checker scans and repairs corrupted system files."],

["DISM tool repairs?",
["RAM","Windows image","Network cables","BIOS"],
1,
"DISM repairs Windows image and component store corruption."],

["Network Troubleshooter helps with?",
["Disk repair","Connectivity issues","Driver removal","BIOS reset"],
1,
"It diagnoses and resolves network connectivity problems."],

["Which tool monitors CPU usage?",
["Event Viewer","Task Manager","Diskpart","Group Policy"],
1,
"Task Manager displays CPU, memory, disk, and network usage."],

["Startup repair is used when?",
["Printer fails","Windows won’t boot","USB fails","WiFi disconnects"],
1,
"Startup Repair fixes boot-related problems."],

["CHKDSK command checks?",
["Network speed","Disk errors","Registry","Firewall"],
1,
"CHKDSK scans disk for file system errors and bad sectors."],

["Reliability Monitor tracks?",
["Battery only","System stability","Disk encryption","Firewall logs"],
1,
"Reliability Monitor shows history of system events and failures."],

["What is Clean Boot used for?",
["Hardware test","Identify software conflicts","Upgrade OS","Defrag disk"],
1,
"Clean Boot starts Windows with minimal services to isolate issues."],

/* ================= CONFIGURE & CORE SERVICES (61–80) ================= */

["DNS client service resolves?",
["IP addresses","Domain names","Registry","Drivers"],
1,
"DNS resolves domain names to IP addresses."],

["IPConfig command displays?",
["Hardware drivers","Network configuration","Disk partitions","Security policy"],
1,
"ipconfig shows IP address, gateway, and DNS settings."],

["What does DHCP assign?",
["User accounts","IP addresses","Registry keys","Services"],
1,
"DHCP dynamically assigns IP addresses."],

["Firewall protects against?",
["Low RAM","Unauthorized access","Slow CPU","Disk corruption"],
1,
"Firewall blocks unauthorized network traffic."],

["Remote Desktop allows?",
["Disk format","Remote system access","BIOS edit","Driver update"],
1,
"RDP allows remote connection to another Windows PC."],

["BitLocker encrypts?",
["RAM","Entire drive","Registry","BIOS"],
1,
"BitLocker provides full-disk encryption."],

["PowerShell is used for?",
["Graphic design","Automation and scripting","Gaming","Audio mixing"],
1,
"PowerShell automates administrative tasks."],

["Windows Defender is?",
["Antivirus solution","Firewall only","BIOS tool","Disk manager"],
0,
"Microsoft Defender provides built-in antivirus protection."],

["VPN connection provides?",
["Disk speed","Secure remote access","BIOS protection","RAM boost"],
1,
"VPN encrypts network traffic for secure access."],

["Credential Manager stores?",
["Drivers","Passwords","Firewall rules","Logs"],
1,
"It securely stores credentials for apps and websites."],

/* ================= WINDOWS 11 SECURITY (81–100) ================= */

["UAC stands for?",
["User Access Control","User Account Control","Unified Access Config","User Admin Console"],
1,
"UAC prevents unauthorized system changes by prompting for admin approval."],

["Windows Hello supports?",
["Fingerprint login","BIOS setup","Disk format","Driver repair"],
0,
"Windows Hello allows biometric authentication like fingerprint and face recognition."],

["TPM chip enhances?",
["Graphics","Security","Sound","RAM"],
1,
"Trusted Platform Module provides hardware-based security."],

["Secure Boot prevents?",
["Disk errors","Unauthorized OS loading","Low battery","Slow boot"],
1,
"Secure Boot ensures only trusted software runs at startup."],

["SmartScreen protects against?",
["RAM overflow","Malicious downloads","Disk failure","Driver error"],
1,
"SmartScreen warns users about malicious apps and websites."],

["Antivirus signatures are?",
["Hardware files","Malware definitions","Driver logs","Firewall rules"],
1,
"Signatures detect known malware patterns."],

["Encryption protects data from?",
["Accidental deletion","Unauthorized access","Low RAM","Slow CPU"],
1,
"Encryption prevents unauthorized users from accessing data."],

["Account lockout policy prevents?",
["Driver issues","Brute-force attacks","Disk corruption","WiFi drops"],
1,
"Account lockout blocks repeated failed login attempts."],

["Multi-factor authentication requires?",
["One password","Two or more verification factors","Admin rights","Firewall"],
1,
"MFA improves security by requiring additional verification."],

["Security patches fix?",
["UI design","Vulnerabilities","Hardware size","App themes"],
1,
"Security patches address known vulnerabilities to prevent exploitation."]

];
/* SHUFFLE */
questions.sort(()=>Math.random()-0.5);

/* RENDER */
const form=document.getElementById("quizForm");
const nav=document.getElementById("nav");

questions.forEach((q,i)=>{
  nav.innerHTML+=`
    <div class="nav-btn" id="nav${i}" onclick="go(${i})">${i+1}</div>
  `;

  form.innerHTML+=`
    <div class="question" id="q${i}">
      <b>${i+1}. ${q[0]}</b>
      <div class="options">
        ${q[1].map((o,j)=>`
          <label>
            <input type="radio" name="q${i}" value="${j}" onchange="mark(${i})">
            ${o}
          </label>
        `).join("")}
      </div>
      <div class="solution" id="sol${i}">
        <b>Answer:</b> ${q[1][q[2]]}<br>
        <b>Explanation:</b> ${q[3]}
      </div>
    </div>
  `;
});

form.innerHTML+=`<button type="button" onclick="submitQuiz()">Submit</button>`;

/* INTERACTION */
function go(i){
  document.getElementById("q"+i).scrollIntoView({behavior:"smooth"});
}

function mark(i){
  document.getElementById("nav"+i).classList.add("answered");
  updateProgress();
}

function updateProgress(){
  const done=document.querySelectorAll(".answered").length;
  document.getElementById("progressBar").style.width=
    (done/questions.length*100)+"%";
}

/* SUBMIT */
function submitQuiz(auto=false){
  submitted=true;
  clearInterval(timer);
  let score=0;

  questions.forEach((q,i)=>{
    const sel=document.querySelector(`input[name="q${i}"]:checked`);
    const sol=document.getElementById("sol"+i);
    const navBtn=document.getElementById("nav"+i);
    sol.style.display="block";

    if(sel && Number(sel.value)===q[2]){
      score++;
      sol.classList.add("correct");
      navBtn.className="nav-btn correct";
    }else{
      sol.classList.add("wrong");
      navBtn.className="nav-btn wrong";
    }
  });

  const res=document.getElementById("result");
  res.style.display="block";
  res.innerHTML=`
    <h2>Result</h2>
    <p><b>Score:</b> ${score}/${questions.length}</p>
    <p><b>Percentage:</b> ${(score/questions.length*100).toFixed(0)}%</p>
    ${auto?"<b>Auto-submitted (Time Over)</b>":""}
  `;
  window.scrollTo({top:0,behavior:"smooth"});
}
</script>

</body>
</html>
