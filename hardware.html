<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hardware Essential – Interactive Mock Test</title>

<style>
:root{
/* LIGHT MODE */
--bg:#F5F5DC;
--card:#ffffff;
--panel:#f1f1e6;
--border:#d6d6c8;

--text:#301934;
--muted:#6b5f73;

--accent:#9F2B68;
--cta:#CC5500;

/* STATUS */
--green:#2e7d32;
--red:#c62828;
--yellow:#CC5500;
}

/* DARK MODE */
[data-theme="dark"]{
--bg:#301934;
--card:#3a1f47;
--panel:#2a1635;
--border:#4a2b5e;

--text:#F5F5DC;
--muted:#cbbfd1;

--accent:#9F2B68;
--cta:#CC5500;
}
*{box-sizing:border-box}
body{
margin:0;font-family:Inter,Segoe UI,Arial,sans-serif;
background:var(--bg);color:var(--text);
}
header{
  position:sticky;
  top:0;
  z-index:100;

  display:flex;
  justify-content:space-between;
  align-items:center;

  padding:6px 16px;        /* 🔑 small padding */
  height:64px;             /* 🔑 fixed compact height */

  background:linear-gradient(
    180deg,
    rgba(0,0,0,0.35),
    rgba(0,0,0,0.15)
  );

  border-bottom:1px solid var(--border);
  backdrop-filter:blur(8px);
}
.timer{color:var(--green);font-weight:600;font-size:18px}
main{display:flex;max-width:1300px;margin:0 auto}
aside{
width:260px;border-right:1px solid var(--border);
padding:20px;position:sticky;top:64px;height:calc(100vh - 64px);overflow:auto;
}
aside h3{margin-top:0;font-size:16px;color:var(--muted)}
.grid{
display:grid;grid-template-columns:repeat(5,1fr);gap:8px;
}
.nav-btn{
padding:8px;border-radius:6px;border:1px solid var(--border);
background:var(--panel);color:var(--muted);cursor:pointer;
font-size:13px;text-align:center;
}
.nav-btn.answered{border-color:var(--yellow);color:var(--yellow)}
.nav-btn.correct{border-color:var(--green);color:var(--green)}
.nav-btn.wrong{border-color:var(--red);color:var(--red)}
section{
flex:1;padding:30px 40px;
}
.progress{
height:6px;background:#111;border-radius:6px;overflow:hidden;margin-bottom:20px;
}
.progress div{
height:100%;width:0;background:linear-gradient(90deg,#2ec866,#1ba94c);
transition:.3s;
}
.question{
background:var(--card);border:1px solid var(--border);
border-radius:10px;padding:22px;margin-bottom:24px;
}
.question b{display:block;margin-bottom:14px}
.options label{
display:block;padding:10px 12px;margin-bottom:8px;
border-radius:8px;background:var(--panel);
border:1px solid var(--border);cursor:pointer;transition:.2s;
}
.options label:hover{border-color:var(--green)}
input{margin-right:10px;accent-color:var(--green)}
.solution{
display:none;margin-top:14px;padding:14px;
background:var(--panel);border-left:4px solid var(--border);
border-radius:8px;color:var(--muted);font-size:14px;
}
.correct{border-left-color:var(--green)}
.wrong{border-left-color:var(--red)}
button{
display:block;margin:50px auto;padding:14px 48px;
font-size:16px;font-weight:600;
background:linear-gradient(135deg,#2ec866,#1ba94c);
color:#06130c;border:none;border-radius:8px;cursor:pointer;
}
.result{
display:none;background:var(--card);border-left:6px solid var(--green);
padding:26px;border-radius:10px;margin-bottom:40px;
}
button:hover{
  transform:translateY(-1px);
  box-shadow:0 6px 18px rgba(0,0,0,.2);
}

.nav-btn{
  transition:.2s ease;
}

.nav-btn:hover{
  background:var(--accent);
  color:#fff;
  border-color:var(--accent);
}

.options label{
  transition:.2s ease;
}

.options input:checked + span{
  color:var(--accent);
}

.question{
  box-shadow:0 10px 30px rgba(0,0,0,.15);
}
header b{
  font-size:24px;
  font-weight:600;
}

.timer{
  font-size:14px;
  font-weight:600;
}
</style>
</head>

<body data-theme="dark">

<header>
  <b>Hardware Essential Mock Test</b>
  <div class="timer" id="timer">60:00</div>
</header>

<main>
  <aside>
    <h3>Questions</h3>
    <div class="grid" id="nav"></div>
  </aside>

  <section>
    <div class="progress"><div id="progressBar"></div></div>
    <div id="result" class="result"></div>
    <form id="quizForm"></form>
  </section>
</main>

<script>
/* TIMER */
let time=3600,submitted=false;
const timerEl=document.getElementById("timer");

const timer=setInterval(()=>{
  time--;
  timerEl.textContent=
    String(Math.floor(time/60)).padStart(2,'0')+":"+
    String(time%60).padStart(2,'0');

  if(time<=0 && !submitted){
    clearInterval(timer);
    submitQuiz(true);
  }
},1000);

/* QUESTIONS */
const questions = [

/* ================= TYPES OF COMPUTERS (1–10) ================= */

["A supercomputer is primarily used for?",
["Word processing","Scientific simulations","Email","Gaming"],
1,
"Supercomputers perform complex calculations such as weather modeling and scientific research."],

["A workstation is designed for?",
["Basic typing","High-performance tasks like CAD","Only browsing","Mobile use"],
1,
"Workstations are optimized for engineering, graphics, and heavy processing."],

["A mainframe is commonly used for?",
["Personal use","Large enterprise data processing","Gaming","Web browsing"],
1,
"Mainframes handle high-volume transaction processing."],

["A desktop computer is?",
["Portable device","Stationary personal computer","Supercomputer","Blade server"],
1,
"A desktop is a personal stationary computer."],

["A laptop is also called?",
["Tower","Notebook","Blade","Rack server"],
1,
"Laptop computers are portable and also known as notebooks."],

["Embedded systems are found in?",
["Cars and appliances","Data centers only","Gaming PCs","Mainframes"],
0,
"Embedded systems are integrated into devices like cars and microwaves."],

["A tablet primarily uses?",
["Touch interface","BIOS interface","RAID","Northbridge"],
0,
"Tablets are touch-based portable devices."],

["Thin client depends on?",
["Local storage","Server processing","RAID","Flash BIOS"],
1,
"Thin clients rely on server-side computing."],

["Cloud servers are hosted?",
["Locally only","In remote data centers","Inside BIOS","In CMOS"],
1,
"Cloud servers operate from remote data centers."],

["A microcontroller is?",
["Full computer","Small integrated processor for control systems","Server rack","Blade unit"],
1,
"Microcontrollers are compact processors used in embedded systems."],

/* ================= TYPES OF SERVERS (11–20) ================= */

["A tower server looks like?",
["Flat chassis","Desktop tower","Blade slot","Rack strip"],
1,
"Tower servers resemble desktop towers."],

["Rack servers are mounted in?",
["Tower cases","Server racks","Motherboards","Northbridge"],
1,
"Rack servers are installed in standardized racks."],

["Blade servers are?",
["Standalone towers","Modular servers sharing chassis","External drives","Storage arrays"],
1,
"Blade servers share power and cooling inside a chassis."],

["Which server type saves space most efficiently?",
["Tower","Blade","Desktop","Laptop"],
1,
"Blade servers maximize space efficiency."],

["Rack units (U) measure?",
["Speed","Height","Voltage","Cache"],
1,
"Rack units measure vertical height in racks."],

["File server stores?",
["BIOS","User files","Registers","Cache"],
1,
"File servers store shared data."],

["Print server manages?",
["RAM","Printer queues","CPU cache","BIOS"],
1,
"Print servers manage network printers."],

["Application server hosts?",
["Operating system only","Applications for clients","BIOS","CMOS"],
1,
"Application servers run client-accessed applications."],

["Web server delivers?",
["BIOS updates","Web pages","RAM","Cache"],
1,
"Web servers serve web content."],

["Database server stores?",
["Registers","Structured data","BIOS","Northbridge"],
1,
"Database servers manage structured databases."],

/* ================= BITS & BYTES (21–25) ================= */

["1 byte equals?",
["4 bits","8 bits","16 bits","32 bits"],
1,
"A byte consists of 8 bits."],

["1 KB equals?",
["1000 bytes","1024 bytes","512 bytes","2048 bytes"],
1,
"Kilobyte in computing equals 1024 bytes."],

["Binary system uses?",
["0-9","0 and 1","A-Z","1-9"],
1,
"Binary uses only 0 and 1."],

["A bit represents?",
["Letter","Binary digit","Byte","Cache"],
1,
"A bit is the smallest unit of data."],

["1 MB equals?",
["1024 KB","100 KB","512 KB","2048 KB"],
0,
"1 Megabyte equals 1024 Kilobytes."],

/* ================= CPU & PROCESSING (26–40) ================= */

["CPU stands for?",
["Central Processing Unit","Computer Power Unit","Core Processing Utility","Control Processing Unit"],
0,
"CPU executes instructions."],

["Clock speed measures?",
["RAM size","Processing speed","Disk size","Cache"],
1,
"Clock speed indicates cycles per second."],

["Registers are?",
["Large storage","Small high-speed CPU memory","Hard drives","Ports"],
1,
"Registers store immediate data for CPU."],

["L1 cache is?",
["Slowest","Fastest and smallest","External","ROM"],
1,
"L1 cache is closest and fastest."],

["L3 cache is?",
["Smallest","Largest shared cache","External RAM","ROM"],
1,
"L3 cache is larger shared among cores."],

["Multicore processor contains?",
["Multiple CPUs","Multiple cores in one CPU","Multiple RAM","Multiple BIOS"],
1,
"Multicore has several cores in one chip."],

["Multiprocessing uses?",
["Single CPU","Multiple CPUs","No CPU","Only RAM"],
1,
"Multiprocessing uses multiple physical processors."],

["Front Side Bus connects?",
["CPU to RAM","RAM to HDD","USB to GPU","BIOS to CMOS"],
0,
"FSB connects CPU to main memory."],

["System bus carries?",
["Only data","Data, address, control signals","Only power","Only BIOS"],
1,
"System bus transmits data and control signals."],

["Northbridge traditionally connects?",
["CPU and RAM","USB","Printer","CMOS"],
0,
"Northbridge handled CPU-RAM communication."],

/* ================= MEMORY (41–55) ================= */

["RAM is?",

0,
"RAM loses data when power off."],

["SRAM stands for?",

0,
"SRAM does not require refresh cycles."],

["DRAM requires?",
["No refresh","Periodic refresh","BIOS","CMOS"],
1,
"DRAM requires refresh to retain data."],

["DDR stands for?",
["Double Data Rate","Dynamic Data RAM","Digital Data Rate","Disk Data Rate"],
0,
"DDR transfers data twice per cycle."],

["DIMM stands for?",
["Dual Inline Memory Module","Direct Internal Memory Module","Data Integrated Memory Module","Dynamic Inline Module"],
0,
"DIMM is modern memory module type."],

["SIMM stands for?",
["Single Inline Memory Module","System Inline Module","Secure Internal Module","Static Internal Memory"],
0,
"SIMM is older memory module."],

["ROM is?",
["Writable","Read-only memory","Cache","RAM"],
1,
"ROM stores firmware."],

["Flash ROM allows?",
["No rewrite","Reprogramming","RAID","Bus"],
1,
"Flash ROM can be updated."],

["CMOS stores?",
["BIOS settings","RAM","Cache","Drivers"],
0,
"CMOS stores BIOS configuration settings."],

["POST stands for?",
["Power-On Self-Test","Processor Operation System Test","Power Operational Setup Test","Primary OS Test"],
0,
"POST checks hardware during startup."],

/* ================= STORAGE (56–75) ================= */

["HDD stores data on?",
["Platters","RAM","Cache","Registers"],
0,
"HDD uses magnetic platters."],

["SSD uses?",
["Moving parts","Flash memory","Platters","Tape"],
1,
"SSD uses solid-state flash storage."],

["SATA is?",
["Old parallel","Serial interface","Cache","Bus"],
1,
"SATA is serial storage interface."],

["PATA is?",
["Parallel ATA","Portable ATA","Primary ATA","PCI ATA"],
0,
"PATA is older parallel interface."],

["SAS is commonly used in?",

["NVMe connects via?",
["SATA","PCIe","USB","IDE"],

"NVMe uses PCIe for high-speed access."],

["Primary storage refers to?",

0,
"Primary storage is main memory (RAM)."],

["RAID 0 provides?",

1,
"RAID 0 improves speed without redundancy."],

/* ================= PORTS & PERIPHERALS (76–90) ================= */

["USB stands for?",
["Universal Serial Bus","Unique System Bus","Unified Storage Bus","Ultra Serial Bus"],
0,
"USB is common connection interface."],

["HDMI transmits?",
["Audio only","Video and audio","Power only","Data only"],
1,
"HDMI carries digital video and audio."],

["VGA is?",
["Digital port","Analog video port","USB port","Ethernet port"],
1,
"VGA transmits analog video signals."],

["Ethernet port is used for?",
["Display","Networking","Audio","BIOS"],
1,
"Ethernet connects to network."],

["Serial port transmits?",
["Parallel data","One bit at time","Audio","Video"],
1,
"Serial sends data sequentially."],

["Parallel port sends?",
["One bit","Multiple bits simultaneously","No data","Video"],
1,
"Parallel sends multiple bits."],

["Keyboard is?",
["Output","Input","Processing","Storage"],
1,
"Keyboard inputs data."],

["Monitor is?",
["Input","Output","Storage","Processing"],
1,
"Monitor displays output."],

["Scanner is?",
["Output","Input device","Processing","Storage"],
1,
"Scanner captures images."],

["Impact printer example?",
["Laser","Dot matrix","Inkjet","Thermal"],
1,
"Dot matrix is impact printer."],

/* ================= ADVANCED & MANAGEMENT (91–100) ================= */

["Non-impact printer example?",
["Dot matrix","Laser printer","Typewriter","Hammer printer"],
1,
"Laser printer is non-impact."],

["Projector is?",
["Input","Output device","CPU","RAM"],
1,
"Projector displays output."],

["Microphone is?",
["Output","Input device","Storage","Bus"],
1,
"Microphone captures sound."],

["Video conferencing requires?",
["Camera and microphone","RAID","BIOS","DIMM"],
0,
"Camera and mic needed."],

["ILO stands for?",
["Integrated Lights-Out","Internal LAN Output","Internet Local Option","Integrated Local Operation"],
0,
"iLO allows remote server management."],

["ISA stands for?",
["Industry Standard Architecture","Integrated System Access","Internal Serial Access","Internet System Adapter"],
0,
"ISA is older expansion bus."],

["PCI stands for?",
["Peripheral Component Interconnect","Primary Cache Interface","Parallel Control Interface","Processor Control Integration"],
0,
"PCI connects expansion devices."],

["AGP was designed for?",
["Network cards","Graphics cards","Sound cards","RAM"],
1,
"AGP was graphics bus."],

["Chipset controls?",
["RAM and peripherals","Only CPU","Only BIOS","Only USB"],
0,
"Chipset manages communication between CPU, RAM, devices."],

["Southbridge traditionally handled?",
["CPU","I/O devices","Cache","Registers"],
1,
"Southbridge handled slower I/O operations."]
];
/* SHUFFLE */
questions.sort(()=>Math.random()-0.5);

/* RENDER */
const form=document.getElementById("quizForm");
const nav=document.getElementById("nav");

questions.forEach((q,i)=>{
  nav.innerHTML+=`
    <div class="nav-btn" id="nav${i}" onclick="go(${i})">${i+1}</div>
  `;

  form.innerHTML+=`
    <div class="question" id="q${i}">
      <b>${i+1}. ${q[0]}</b>
      <div class="options">
        ${q[1].map((o,j)=>`
          <label>
            <input type="radio" name="q${i}" value="${j}" onchange="mark(${i})">
            ${o}
          </label>
        `).join("")}
      </div>
      <div class="solution" id="sol${i}">
        <b>Answer:</b> ${q[1][q[2]]}<br>
        <b>Explanation:</b> ${q[3]}
      </div>
    </div>
  `;
});

form.innerHTML+=`<button type="button" onclick="submitQuiz()">Submit</button>`;

/* INTERACTION */
function go(i){
  document.getElementById("q"+i).scrollIntoView({behavior:"smooth"});
}

function mark(i){
  document.getElementById("nav"+i).classList.add("answered");
  updateProgress();
}

function updateProgress(){
  const done=document.querySelectorAll(".answered").length;
  document.getElementById("progressBar").style.width=
    (done/questions.length*100)+"%";
}

/* SUBMIT */
function submitQuiz(auto=false){
  submitted=true;
  clearInterval(timer);
  let score=0;

  questions.forEach((q,i)=>{
    const sel=document.querySelector(`input[name="q${i}"]:checked`);
    const sol=document.getElementById("sol"+i);
    const navBtn=document.getElementById("nav"+i);
    sol.style.display="block";

    if(sel && Number(sel.value)===q[2]){
      score++;
      sol.classList.add("correct");
      navBtn.className="nav-btn correct";
    }else{
      sol.classList.add("wrong");
      navBtn.className="nav-btn wrong";
    }
  });

  const res=document.getElementById("result");
  res.style.display="block";
  res.innerHTML=`
    <h2>Result</h2>
    <p><b>Score:</b> ${score}/${questions.length}</p>
    <p><b>Percentage:</b> ${(score/questions.length*100).toFixed(0)}%</p>
    ${auto?"<b>Auto-submitted (Time Over)</b>":""}
  `;
  window.scrollTo({top:0,behavior:"smooth"});
}
</script>

</body>
</html>
